naftiko: 1.0.0-alpha2
info:
  label: Replit — Deployments
  description: 'Replit — Deployments. 4 operations. Lead operation: Get a Deployment. Self-contained Naftiko capability covering
    one Replit business surface.'
  tags:
  - Replit
  - Deployments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REPLIT_API_KEY: REPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: replit-deployments
    baseUri: https://replit.com/api/v1
    description: Replit — Deployments business capability. Self-contained, no shared references.
    resources:
    - name: deployments-deploymentId
      path: /deployments/{deploymentId}
      operations:
      - name: deploymentsget
        method: GET
        description: Get a Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deploymentId
          in: path
          type: string
          description: The deployment ID.
          required: true
      - name: deploymentsdelete
        method: DELETE
        description: Delete a Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deploymentId
          in: path
          type: string
          description: The deployment ID.
          required: true
    - name: repls-replId-deployments
      path: /repls/{replId}/deployments
      operations:
      - name: replsdeploymentslist
        method: GET
        description: List Repl Deployments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: replId
          in: path
          type: string
          description: The Repl ID.
          required: true
      - name: replsdeploymentscreate
        method: POST
        description: Create a Repl Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: replId
          in: path
          type: string
          description: The Repl ID to deploy.
          required: true
    authentication:
      type: bearer
      token: '{{env.REPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: replit-deployments-rest
    port: 8080
    description: REST adapter for Replit — Deployments. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/deployments/{deploymentid}
      name: deployments-deploymentid
      description: REST surface for deployments-deploymentId.
      operations:
      - method: GET
        name: deploymentsget
        description: Get a Deployment
        call: replit-deployments.deploymentsget
        with:
          deploymentId: rest.deploymentId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deploymentsdelete
        description: Delete a Deployment
        call: replit-deployments.deploymentsdelete
        with:
          deploymentId: rest.deploymentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repls/{replid}/deployments
      name: repls-replid-deployments
      description: REST surface for repls-replId-deployments.
      operations:
      - method: GET
        name: replsdeploymentslist
        description: List Repl Deployments
        call: replit-deployments.replsdeploymentslist
        with:
          replId: rest.replId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: replsdeploymentscreate
        description: Create a Repl Deployment
        call: replit-deployments.replsdeploymentscreate
        with:
          replId: rest.replId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: replit-deployments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Replit — Deployments. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-deployment
      description: Get a Deployment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replit-deployments.deploymentsget
      with:
        deploymentId: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-deployment
      description: Delete a Deployment
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: replit-deployments.deploymentsdelete
      with:
        deploymentId: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-repl-deployments
      description: List Repl Deployments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replit-deployments.replsdeploymentslist
      with:
        replId: tools.replId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-repl-deployment
      description: Create a Repl Deployment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: replit-deployments.replsdeploymentscreate
      with:
        replId: tools.replId
      outputParameters:
      - type: object
        mapping: $.
