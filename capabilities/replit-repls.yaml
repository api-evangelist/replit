        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of results per page.
        - name: cursor
          in: query
          type: string
          description: Pagination cursor.
      - name: replscreate
