naftiko: 1.0.0-alpha2
info:
  label: Replit — Users
  description: 'Replit — Users. 3 operations. Lead operation: Get Current User. Self-contained Naftiko capability covering
    one Replit business surface.'
  tags:
  - Replit
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REPLIT_API_KEY: REPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: replit-users
    baseUri: https://replit.com/api/v1
    description: Replit — Users business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: userget
        method: GET
        description: Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-username
      path: /users/{username}
      operations:
      - name: usersget
        method: GET
        description: Get a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The user's username.
          required: true
    - name: users-username-repls
      path: /users/{username}/repls
      operations:
      - name: usersreplslist
        method: GET
        description: List User Repls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: username
          in: path
          type: string
          description: The user's username.
          required: true
        - name: limit
          in: query
          type: integer
          description: Number of results per page.
        - name: cursor
          in: query
          type: string
          description: Pagination cursor.
    authentication:
      type: bearer
      token: '{{env.REPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: replit-users-rest
    port: 8080
    description: REST adapter for Replit — Users. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: userget
        description: Get Current User
        call: replit-users.userget
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{username}
      name: users-username
      description: REST surface for users-username.
      operations:
      - method: GET
        name: usersget
        description: Get a User
        call: replit-users.usersget
        with:
          username: rest.username
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{username}/repls
      name: users-username-repls
      description: REST surface for users-username-repls.
      operations:
      - method: GET
        name: usersreplslist
        description: List User Repls
        call: replit-users.usersreplslist
        with:
          username: rest.username
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: replit-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Replit — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-current-user
      description: Get Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replit-users.userget
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get a User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replit-users.usersget
      with:
        username: tools.username
      outputParameters:
      - type: object
        mapping: $.
    - name: list-user-repls
      description: List User Repls
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: replit-users.usersreplslist
      with:
        username: tools.username
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
